<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — GN FinTrust</title>
<meta name="robots" content="noindex">
<style>
  :root{
    --red:#C8102E; --red-dark:#A00E24; --red-soft:#FBE9EC; --red-border:#F2C6CE;
    --text:#211D1D; --text2:#6E6867; --soft:#FAF7F6; --border:#E8E2E1;
    --green:#2F7351; --green-soft:#E8F1EC;
    --head:Georgia,"Times New Roman",serif;
    --body:"Trebuchet MS",Verdana,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);color:var(--text);background:var(--soft);font-size:16px;line-height:1.55;min-height:100vh;display:flex;flex-direction:column}
  h1{font-family:var(--head)}
  a{color:var(--red);text-decoration:none}
  a:focus-visible,button:focus-visible{outline:2px solid var(--red);outline-offset:2px}
  header{border-bottom:3px solid var(--red);background:#fff}
  .nav{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:66px}
  .brand{display:flex;align-items:center;gap:10px;color:var(--text);font-family:var(--head);font-weight:700;font-size:19px}
  .brand-mark{width:32px;height:32px;border-radius:6px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--body)}
  .back{font-size:14px;color:var(--text2)}
  .back:hover{color:var(--red)}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:36px 32px;width:100%;max-width:420px}
  h1{font-size:25px;text-align:center;margin-bottom:6px}
  .lede{color:var(--text2);font-size:14.5px;text-align:center;margin-bottom:24px}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:1px solid var(--border);background:#fff;border-radius:6px;padding:12px;font-size:15px;font-weight:700;font-family:var(--body);cursor:pointer;min-height:48px}
  .gbtn:hover{background:var(--soft)}
  .div{display:flex;align-items:center;gap:12px;color:var(--text2);font-size:12px;margin:20px 0}
  .div::before,.div::after{content:"";flex:1;height:1px;background:var(--border)}
  label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px}
  input{width:100%;border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-size:15px;font-family:var(--body)}
  input:focus{outline:2px solid var(--red);outline-offset:0;border-color:var(--red)}
  .row{display:flex;gap:10px;margin-top:22px}
  .btn{flex:1;border-radius:6px;padding:13px;font-size:15px;font-weight:700;font-family:var(--body);cursor:pointer;border:1px solid transparent;min-height:48px}
  .btn-primary{background:var(--red);color:#fff;border:0}
  .btn-primary:hover{background:var(--red-dark)}
  .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
  .btn-ghost:hover{background:var(--soft)}
  .msg{display:none;border-radius:8px;padding:12px 14px;margin-top:18px;font-size:14px}
  .msg.err{background:#FCE9E7;border:1px solid #f0c3bd;color:#b3402f}
  .msg.good{background:var(--green-soft);border:1px solid #bcd9c9;color:var(--green)}
  .note{font-size:12.5px;color:var(--text2);text-align:center;margin-top:18px}
</style>
</head>
<body>
<header>
  <div class="nav">
    <a class="brand" href="index.html"><span class="brand-mark">GN</span> GN FinTrust</a>
    <a class="back" href="index.html">← На сайт</a>
  </div>
</header>
<main>
  <div class="card">
    <h1>Мой кабинет</h1>
    <p class="lede">Войдите с логином и паролем, которые мы прислали после покупки.</p>
    <button class="gbtn" id="googleBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Войти через Google
    </button>
    <div class="div">или по почте</div>
    <label for="email">Почта</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <label for="pass">Пароль</label>
    <input type="password" id="pass" placeholder="Не менее 6 символов" autocomplete="current-password">
    <div class="row">
      <button class="btn btn-primary" id="loginBtn" type="button">Войти</button>
      <button class="btn btn-ghost" id="signupBtn" type="button">Регистрация</button>
    </div>
    <div class="msg" id="msg"></div>
    <p class="note">Купили, но не получили логин? Мы отправляем доступ в WhatsApp, на почту или в Telegram после подтверждения оплаты.</p>
  </div>
</main>
<script type="module">
  const msg = document.getElementById("msg")
  function show(text, good) {
    msg.textContent = text
    msg.className = "msg " + (good ? "good" : "err")
    msg.style.display = "block"
  }
  let fb = null
  async function boot() {
    try {
      const { firebaseConfig } = await import("./firebase-config.js")
      if (firebaseConfig.apiKey.startsWith("PASTE_")) {
        show("Вход ещё не настроен — владелец сайта должен добавить ключи Firebase в firebase-config.js (см. README).", false)
        return
      }
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js")
      const authMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js")
      const fsMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
      const app = initializeApp(firebaseConfig)
      fb = { auth: authMod.getAuth(app), db: fsMod.getFirestore(app), authMod, fsMod }
    } catch (e) {
      show("Не удалось загрузить систему входа: " + (e.message || e), false)
    }
  }
  await boot()

  async function ensureUserDoc(user) {
    const ref = fb.fsMod.doc(fb.db, "users", user.uid)
    const snap = await fb.fsMod.getDoc(ref)
    if (!snap.exists()) {
      await fb.fsMod.setDoc(ref, {
        name: user.displayName || "",
        email: user.email || "",
        admin: false,
        purchases: [],
        createdAt: new Date().toISOString(),
      })
    }
  }
  async function finish(user) {
    await ensureUserDoc(user)
    show("Добро пожаловать! Переходим…", true)
    location.href = "members.html"
  }

  document.getElementById("googleBtn").addEventListener("click", async () => {
    if (!fb) return
    try {
      const res = await fb.authMod.signInWithPopup(fb.auth, new fb.authMod.GoogleAuthProvider())
      await finish(res.user)
    } catch (e) { show(e.message || String(e), false) }
  })
  document.getElementById("loginBtn").addEventListener("click", async () => {
    if (!fb) return
    try {
      const res = await fb.authMod.signInWithEmailAndPassword(fb.auth, email.value.trim(), pass.value)
      await finish(res.user)
    } catch (e) { show("Не удалось войти: " + (e.message || e), false) }
  })
  document.getElementById("signupBtn").addEventListener("click", async () => {
    if (!fb) return
    try {
      const res = await fb.authMod.createUserWithEmailAndPassword(fb.auth, email.value.trim(), pass.value)
      await finish(res.user)
    } catch (e) { show("Не удалось зарегистрироваться: " + (e.message || e), false) }
  })
</script>
</body>
</html>
