<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com https://*.google.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://drive.google.com https://docs.google.com https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com; form-action 'self' mailto:">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="theme-color" content="#C8102E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23C8102E'/%3E%3Ctext x='16' y='22' font-family='Georgia, serif' font-size='14' font-weight='bold' fill='%23FFFFFF' text-anchor='middle'%3EGN%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Вход — GN FinTrust</title>
<meta name="robots" content="noindex">
<style>
  :root{
    --red:#C8102E; --red-dark:#A00E24; --red-soft:#FBE9EC; --red-border:#F2C6CE;
    --text:#211D1D; --text2:#6E6867; --soft:#FAF7F6; --border:#E8E2E1;
    --green:#2F7351; --green-soft:#E8F1EC;
    --head:"Inter",-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    --body:"Inter",-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);color:var(--text);background:linear-gradient(180deg,var(--red-soft) 0%,var(--soft) 340px);font-size:16px;line-height:1.65;min-height:100vh;display:flex;flex-direction:column}
  h1{font-family:var(--head)}
  a{color:var(--red);text-decoration:none}
  a:focus-visible,button:focus-visible{outline:2px solid var(--red);outline-offset:2px}
  ::selection{background:var(--red);color:#fff}
  header{border-bottom:3px solid var(--red);background:#fff}
  .nav{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:66px}
  .brand{display:flex;align-items:center;gap:10px;color:var(--text);font-family:var(--head);font-weight:600;font-size:19px}
  .brand-mark{width:32px;height:32px;border-radius:6px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-family:var(--body);overflow:hidden;background-size:cover;background-position:center;flex:none}
  .back{font-size:14px;color:var(--text2)}
  .back:hover{color:var(--red)}
  .lang-slider{position:relative;width:66px;height:30px;border:1px solid var(--border);border-radius:20px;background:#fff;cursor:pointer;user-select:none;flex:none}
  .lang-slider .knob{position:absolute;top:50%;left:1px;margin-top:-14px;width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;font-weight:600;line-height:28px;text-align:center;font-family:var(--body);cursor:grab;transition:transform .15s ease}
  .lang-slider .knob.dragging{transition:none;cursor:grabbing}
  .lang-slider .lbl{position:absolute;top:0;bottom:0;width:32px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text2);font-family:var(--body)}
  .lang-slider .lbl.l{left:0}
  .lang-slider .lbl.r{right:0}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:64px 20px}
  .card{background:#fff;border:1px solid var(--border);border-radius:2px;padding:44px 36px;width:100%;max-width:420px;box-shadow:0 1px 2px rgba(33,29,29,.05),0 14px 40px rgba(33,29,29,.08)}
  h1{font-size:25px;text-align:center;margin-bottom:6px}
  .lede{color:var(--text2);font-size:14.5px;text-align:center;margin-bottom:24px}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:1px solid var(--border);background:#fff;border-radius:999px;padding:12px;font-size:15px;font-weight:600;font-family:var(--body);cursor:pointer;min-height:48px;transition:background-color .18s ease,border-color .18s ease}
  .gbtn:hover{background:var(--soft)}
  .div{display:flex;align-items:center;gap:12px;color:var(--text2);font-size:12px;margin:20px 0}
  .div::before,.div::after{content:"";flex:1;height:1px;background:var(--border)}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  input{width:100%;border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-size:15px;font-family:var(--body);background:#fff;transition:border-color .15s ease}
  input:focus{outline:2px solid var(--red);outline-offset:0;border-color:var(--red)}
  .row{display:flex;gap:10px;margin-top:22px}
  .btn{flex:1;border-radius:999px;padding:13px;font-size:15px;font-weight:600;font-family:var(--body);cursor:pointer;border:1px solid transparent;min-height:48px;transition:background-color .18s ease,border-color .18s ease,box-shadow .18s ease,transform .18s ease}
  .btn-primary{background:var(--red);color:#fff;border:0}
  .btn-primary:hover{background:var(--red-dark);box-shadow:0 5px 16px rgba(200,16,46,.3);transform:translateY(-1px)}
  .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
  .btn-ghost:hover{background:var(--soft)}
  .msg{display:none;border-radius:8px;padding:12px 14px;margin-top:18px;font-size:14px}
  .msg.err{background:#FCE9E7;border:1px solid #f0c3bd;color:#b3402f}
  .msg.good{background:var(--green-soft);border:1px solid #bcd9c9;color:var(--green)}
  .note{font-size:12.5px;color:var(--text2);text-align:center;margin-top:18px}
  html{-webkit-text-size-adjust:100%}
  html,body{overflow-x:clip}
  @media (max-width:480px), (max-height:560px) and (orientation:landscape){
    .card{padding:30px 20px;margin:24px auto}
    input{font-size:16px}
    button{min-height:44px}
  }
</style>
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
<link rel="prefetch" href="members.html">
<link rel="prefetch" href="index.html">
</head>
<body>
<header>
  <div class="nav">
    <a class="brand" href="index.html"><span class="brand-mark" id="brandMark">GN</span> GN FinTrust</a>
    <div style="display:flex;align-items:center;gap:18px">
      <div class="lang-slider" id="langSlider" title="Русский / Кыргызча"><span class="lbl l">RU</span><span class="lbl r">KG</span><span class="knob" id="langKnob">RU</span></div>
      <a class="back" href="index.html">← На сайт</a>
    </div>
  </div>
</header>
<main>
  <div class="card">
    <h1>Мой кабинет</h1>
    <p class="lede">Войдите с логином и паролем, которые мы прислали после покупки.</p>
    <button class="gbtn" id="googleBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Войти через Google
    </button>
    <div class="div">или по почте</div>
    <label for="email">Почта</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <label for="pass">Пароль</label>
    <input type="password" id="pass" placeholder="Не менее 6 символов" autocomplete="current-password">
    <div class="row">
      <button class="btn btn-primary" id="signupBtn" type="button">Регистрация</button>
      <button class="btn btn-ghost" id="loginBtn" type="button">Войти</button>
    </div>
    <div class="msg" id="msg"></div>
    <p class="note">Купили, но не получили логин? Мы отправляем доступ в WhatsApp, на почту или в Telegram после подтверждения оплаты.</p>
  </div>
</main>
<script src="catalog.js"></script>
<script type="module">
  const msg = document.getElementById("msg")
  function show(text, good) {
    msg.textContent = text
    msg.className = "msg " + (good ? "good" : "err")
    msg.style.display = "block"
  }
  let fb = null
  async function boot() {
    try {
      const { firebaseConfig } = await import("./firebase-config.js")
      if (firebaseConfig.apiKey.startsWith("PASTE_")) {
        show("Вход ещё не настроен — владелец сайта должен добавить ключи Firebase в firebase-config.js (см. README).", false)
        return
      }
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js")
      const authMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js")
      const fsMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
      const app = initializeApp(firebaseConfig)
      fb = { auth: authMod.getAuth(app), db: fsMod.getFirestore(app), authMod, fsMod }
      // Запоминаем вход на этом устройстве: даже после закрытия браузера пользователь остаётся в аккаунте,
      // пока сам не нажмёт «Выйти».
      await fb.authMod.setPersistence(fb.auth, fb.authMod.browserLocalPersistence)
      // Если вы уже вошли — сразу открываем кабинет (проверяем только при загрузке страницы).
      const stop = fb.authMod.onAuthStateChanged(fb.auth, (user) => {
        stop()
        if (user) {
          show("Вы уже вошли — открываем кабинет…", true)
          try { localStorage.setItem("gn_auth", "1"); localStorage.setItem("gn_email", user.email || "") } catch (x) {}
          location.href = "members.html"
        }
      })
    } catch (e) {
      show("Не удалось загрузить систему входа: " + (e.message || e), false)
    }
  }
  await boot()

  async function ensureUserDoc(user) {
    const ref = fb.fsMod.doc(fb.db, "users", user.uid)
    const snap = await fb.fsMod.getDoc(ref)
    try { localStorage.setItem("gn_admin", snap.exists() && snap.data().admin === true ? "1" : "0") } catch (x) {}
    if (!snap.exists()) {
      await fb.fsMod.setDoc(ref, {
        name: user.displayName || "",
        email: user.email || "",
        admin: false,
        purchases: [],
        createdAt: new Date().toISOString(),
      })
    }
  }
  async function finish(user) {
    await ensureUserDoc(user)
    try { localStorage.setItem("gn_auth", "1"); localStorage.setItem("gn_email", user.email || "") } catch (x) {}
    show("Добро пожаловать! Переходим…", true)
    location.href = "members.html"
  }

  document.getElementById("googleBtn").addEventListener("click", async () => {
    if (!fb) return
    try {
      const res = await fb.authMod.signInWithPopup(fb.auth, new fb.authMod.GoogleAuthProvider())
      await finish(res.user)
    } catch (e) { show(e.message || String(e), false) }
  })
  document.getElementById("loginBtn").addEventListener("click", async () => {
    if (!fb) return
    try {
      const res = await fb.authMod.signInWithEmailAndPassword(fb.auth, email.value.trim(), pass.value)
      await finish(res.user)
    } catch (e) { show("Не удалось войти: " + (e.message || e), false) }
  })
  document.getElementById("signupBtn").addEventListener("click", async () => {
    if (!fb) return
    try {
      const res = await fb.authMod.createUserWithEmailAndPassword(fb.auth, email.value.trim(), pass.value)
      await finish(res.user)
    } catch (e) { show("Не удалось зарегистрироваться: " + (e.message || e), false) }
  })
</script>
</body>
</html>
